<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Money Launchpad</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f4f6f9; --card: #fff; --primary: #1e3a8a; --accent: #f97316; --text: #1f2937; --muted: #6b7280; --border: #e5e7eb; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 2rem 1rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-container { width: 100%; max-width: 400px; background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 2.5rem; }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h2 { color: var(--primary); font-size: 1.8rem; margin-bottom: 0.5rem; }
        .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.9rem; font-weight: 600; }
        .form-group input { padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; }
        .auth-btn { background: var(--primary); color: white; border: none; padding: 0.85rem; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .auth-toggle { text-align: center; font-size: 0.9rem; color: var(--muted); margin-top: 1rem; }
        .auth-toggle span { color: var(--accent); cursor: pointer; font-weight: 600; }
        .container { display: none; max-width: 600px; background: var(--card); padding: 2rem; border-radius: 16px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .logout-btn { background: #fee2e2; color: #ef4444; border: 1px solid #fca5a5; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 1.5rem; }
    </style>
</head>
<body>

<div class="auth-container" id="authScreen">
    <div class="auth-header">
        <h2 id="authTitle">Sign In</h2>
        <p style="color: var(--muted); font-size: 0.9rem;">Access your Digital Income Roadmap</p>
    </div>
    <form class="auth-form" id="authForm" onsubmit="handleAuth(event)">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="authEmail" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="authPassword" required placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="auth-btn" id="authSubmitBtn">Login</button>
    </form>
    <div class="auth-toggle">
        <p id="authToggleText">Don't have an account? <span onclick="toggleAuthMode()">Sign Up</span></p>
    </div>
</div>

<div class="container" id="appDashboard">
    <h1 style="color: var(--primary);">🚀 Welcome to Launchpad!</h1>
    <p style="margin-top: 1rem; color: var(--muted);">Your backend connection is officially working.</p>
    <button class="logout-btn" onclick="handleLogout()">Log Out</button>
</div>

<script>
    const SUPABASE_URL = "https://pdjvbteibzlwpxiknciub.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkanZidGliemx3cHhpa25jaXViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDgwMTYsImV4cCI6MjA5NzgyNDAxNn0.2B1GEkU2ijyCOgbkrDdvO8f9XYOzqyLUmCizy_ltBtU";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentMode = "login";

    window.onload = async function() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        routeUser(session);
        supabaseClient.auth.onAuthStateChange((_event, session) => { routeUser(session); });
    };

    function routeUser(session) {
        if (session) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appDashboard').style.display = 'block';
        } else {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('appDashboard').style.display = 'none';
        }
    }

    function toggleAuthMode() {
        currentMode = currentMode === 'login' ? 'signup' : 'login';
        document.getElementById('authTitle').innerText = currentMode === 'login' ? 'Sign In' : 'Create Account';
        document.getElementById('authSubmitBtn').innerText = currentMode === 'login' ? 'Login' : 'Register';
        document.getElementById('authToggleText').innerHTML = currentMode === 'login' 
            ? `Don't have an account? <span onclick="toggleAuthMode()">Sign Up</span>`
            : `Already have an account? <span onclick="toggleAuthMode()">Sign In</span>`;
    }

    async function handleAuth(e) {
        e.preventDefault();
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;

        if (currentMode === 'login') {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        } else {
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Registration successful! Please check your email inbox to confirm your account before logging in.");
        }
    }

    async function handleLogout() {
        await supabaseClient.auth.signOut();
    }
</script>
</body>
</html>
