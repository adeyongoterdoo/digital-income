<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Money Launchpad</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .toggle-text { margin-top: 15px; font-size: 14px; color: #555; cursor: pointer; text-decoration: underline; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div class="container" id="authSection">
        <h2 id="formTitle">Sign Up</h2>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <input type="email" id="authEmail" placeholder="Enter your email" required>
            <input type="password" id="authPassword" placeholder="Enter your password" required>
            <button type="submit" id="submitBtn">Get Started</button>
        </form>
        
        <p class="toggle-text" onclick="toggleMode()" id="toggleBtn">Already have an account? Sign In</p>
    </div>

    <div class="container" id="dashboard">
        <h2>Welcome to the Launchpad!</h2>
        <p>You have successfully logged in.</p>
        <button onclick="handleLogout()">Log Out</button>
    </div>

    <script>
        // 1. Initialize Supabase Client with the EXACT corrected project ID
        const SUPABASE_URL = "https://pdjvbtibzlwpxiknciub.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkanZidGliemx3cHhpa25jaXViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDgwMTYsImV4cCI6MjA5NzgyNDAxNn0.2B1GEkU2ijyCOgbkrDdvO8f9XYOzqyLUmCizy_ltBtU";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. UI State Variables
        let isSignUpMode = true;

        // 3. Main Authentication Function
        async function handleAuth(e) {
            if (e) e.preventDefault(); 

            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            submitBtn.innerText = isSignUpMode ? 'Creating Account...' : 'Logging In...';

            try {
                if (isSignUpMode) {
                    // --- SIGN UP LOGIC ---
                    const { data, error } = await supabaseClient.auth.signUp({ 
                        email: email, 
                        password: password 
                    });
                    
                    if (error) {
                        alert("Error: " + error.message);
                    } else {
                        alert("Registration successful! Logging you in...");
                        showDashboard();
                    }
                } else {
                    // --- LOG IN LOGIC ---
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ 
                        email: email, 
                        password: password 
                    });
                    
                    if (error) {
                        alert("Error: " + error.message);
                    } else {
                        showDashboard();
                    }
                }
            } catch (err) {
                alert('An unexpected error occurred: ' + err.message);
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isSignUpMode ? 'Get Started' : 'Sign In';
            }
        }

        // 4. Toggle between Sign Up and Log In
        function toggleMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('formTitle').innerText = isSignUpMode ? 'Sign Up' : 'Log In';
            document.getElementById('submitBtn').innerText = isSignUpMode ? 'Get Started' : 'Sign In';
            document.getElementById('toggleBtn').innerText = isSignUpMode ? 'Already have an account? Sign In' : 'Need an account? Sign Up';
        }

        // 5. Show Dashboard
        function showDashboard() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        // 6. Handle Logout
        async function handleLogout() {
            const { error } = await supabaseClient.auth.signOut();
            if (error) {
                alert("Error logging out: " + error.message);
            } else {
                document.getElementById('authEmail').value = '';
                document.getElementById('authPassword').value = '';
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
                isSignUpMode = false;
                toggleMode();
            }
        }
    </script>
</body>
</html>
